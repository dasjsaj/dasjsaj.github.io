<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="Shengchao Zhu homepage">
        <span class="brand-mark" aria-hidden="true">SZ</span>
        <span>{{ site.author.name }}</span>
      </a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="#about-me">About</a>
        <a href="#news">News</a>
        <a href="#publications">Publications</a>
        <a href="#projects">Projects</a>
        <a href="#honors-and-awards">Awards</a>
        <a href="#contact">Contact</a>
      </nav>
    </header>

    <main class="page">
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>&copy; {{ site.time | date: '%Y' }} {{ site.author.name }}. Built with GitHub Pages.</p>
    </footer>
  </body>
</html>
